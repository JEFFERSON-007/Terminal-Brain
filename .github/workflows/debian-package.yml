name: Build and Publish Debian Package

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot apt-utils

      - name: Make scripts executable
        run: chmod +x scripts/build_deb.sh scripts/generate_apt_repo.sh scripts/install_local_deb.sh

      - name: Build Debian package
        run: ./scripts/build_deb.sh

      - name: Generate APT repository
        run: ./scripts/generate_apt_repo.sh ./build/apt-repo ./dist/deb

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terminal-brain-deb
          path: |
            dist/deb/*.deb
            build/apt-repo/**

  publish-pages:
    runs-on: ubuntu-latest
    needs: build-deb
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && vars.ENABLE_PAGES_PUBLISH == 'true'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download repository artifact
        uses: actions/download-artifact@v4
        with:
          name: terminal-brain-deb
          path: ./site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/build/apt-repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
